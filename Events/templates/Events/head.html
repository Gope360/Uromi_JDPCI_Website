{% load static %}
{% load custom_filters %}
{% load compress %}

<head>
    <meta charset="utf-8">
    <title>Uromi JDPCI - A Faith-based NGO</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="Community Development, Uromi, Edo State, Nigeria, Chancery Complex, JDPCI, Social Impact, Humanitarian Initiatives" name="keywords">
    <meta content="Uromi JDPCI: A Faith-based NGO under the Catholic Diocese of Uromi, dedicated to promoting Justice and Peace, fostering meaningful development, and providing support to the less privileged in the 5 Local Government Areas of Edo Central Senatorial district." name="description">
    
    <link rel="shortcut icon" href="{% static "img/uromijdpci-logo.png" %}" type="image/x-icon">



    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>    
    <!-- Icon Font Stylesheet -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Jost:wght@300;400;500;600;700&family=Poppins&display=swap">
    <link rel="stylesheet" href="https://unpkg.com/bs-brain@2.0.4/components/faqs/faq-2/assets/css/faq-2.css">


    {% compress css %}
    <!-- Libraries Stylesheet -->
    <link href="{% static "lib/animate/animate.min.css" %}" rel="stylesheet">
    <link href="{% static "lib/owlcarousel/assets/owl.carousel.min.css" %}" rel="stylesheet">
    
    <!-- Customized Bootstrap Stylesheet -->
    <link href="{% static "css/bootstrap.min.css" %}" rel="stylesheet">

    <!-- Template Stylesheet -->
    {% comment %} <link href="{% static "css/style.css" %}" rel="stylesheet"> {% endcomment %}
    <link href="{% static "css/style2.css" %}" rel="stylesheet">
    <link rel="shortcut icon" href="{% static "img/uromijdpci-logo.png" %}" type="image/x-icon">
    {% endcompress %}
</head>
